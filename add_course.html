<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Course</title>
    <link rel="icon" type="image/x-icon" href="./images/logo.jpg" />
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <header class="site-header">
        <div class="navbar">
            <a href="#" class="logo">
                <img src="./images/logo.jpg" alt="Logo" />
            </a>

            <!-- Hamburger button -->
            <button class="hamburger" aria-label="Menu">☰</button>

            <nav class="main-nav" id="main-nav">
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="my_courses.html">My Courses</a></li>
                    <li><a href="add_course.html">Add Course</a></li>
                    <li><a href="contact_us.html">Contact Us</a></li>
                </ul>
            </nav>

            <div class="search_box">
                <input type="text" placeholder="Search here..." />
                <a href="#"><i class="fas fa-search"></i></a>
            </div>
        </div>
    </header>
    <main>
        <section class="formContainer">
            <h2>Add a New Course</h2>
            <form action="#" method="post">
                <label for="courseName">Course Name:</label>
                <input type="text" id="courseName" name="courseName" required />

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required />

                <label for="schedule">Schedule:</label>
                <input type="text" id="schedule" name="schedule" required />

                <label for="credits">Credits:</label>
                <input type="number" id="credits" name="credits" required />

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes"></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>

    </main>

    <footer class="mainFooter">
        <div class="container">
            <div class="design">
                <p>Designed by <span>Karim Ezzat</span></p>
            </div>

            <div class="footerCopyright">
                <p>&copy; 2026 Course Organizer. All rights reserved.</p>
            </div>

            <nav class="footerLinks">
                <a href="index.html">Home</a>
                <a href="my_courses.html">My Courses</a>
                <a href="add_course.html">Add Course</a>
                <a href="contact_us.html">Contact Us</a>
            </nav>
        </div>
    </footer>


</body>

</html>
